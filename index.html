<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💩 똥 피하기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Black+Han+Sans&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Jua', sans-serif;
    overflow: hidden;
  }

  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle linear infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  #game-wrapper {
    position: relative;
    z-index: 1;
  }

  #game-canvas {
    display: block;
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(255, 200, 0, 0.3), 0 0 120px rgba(255, 100, 0, 0.15);
    cursor: none;
  }

  #ui-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    border-radius: 20px;
    overflow: hidden;
  }

  #score-display {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Black Han Sans', sans-serif;
    font-size: 28px;
    color: #fff;
    text-shadow: 0 0 15px rgba(255,220,0,0.8), 2px 2px 0 #333;
    white-space: nowrap;
    letter-spacing: 2px;
  }

  #lives-display {
    position: absolute;
    top: 18px;
    right: 18px;
    font-size: 24px;
    line-height: 1;
  }

  #level-display {
    position: absolute;
    top: 18px;
    left: 18px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 18px;
    color: #ffd700;
    text-shadow: 1px 1px 0 #333;
  }

  #start-screen, #gameover-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10, 4, 20, 0.88);
    border-radius: 20px;
    pointer-events: all;
    gap: 16px;
  }

  #gameover-screen { display: none; }

  .screen-emoji {
    font-size: 80px;
    animation: bounce 0.8s ease-in-out infinite alternate;
    filter: drop-shadow(0 6px 20px rgba(255,200,0,0.5));
  }

  @keyframes bounce {
    from { transform: translateY(0) scale(1); }
    to { transform: translateY(-16px) scale(1.08); }
  }

  .screen-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 42px;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,200,50,0.9), 3px 3px 0 #7c3a00;
    letter-spacing: 4px;
  }

  .screen-sub {
    font-size: 17px;
    color: #ccc;
    text-align: center;
    line-height: 1.7;
  }

  .play-btn {
    margin-top: 10px;
    padding: 16px 50px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 24px;
    color: #1a0a2e;
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: 0 6px 30px rgba(255,180,0,0.5), 0 2px 0 #8b5000;
    letter-spacing: 2px;
  }

  .play-btn:hover {
    transform: translateY(-3px) scale(1.06);
    box-shadow: 0 12px 40px rgba(255,180,0,0.7), 0 2px 0 #8b5000;
  }

  .play-btn:active { transform: translateY(1px) scale(0.98); }

  .score-result {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    color: #ffd700;
    text-shadow: 1px 1px 0 #333;
  }

  .highscore-display {
    font-size: 16px;
    color: #aaa;
  }

  .controls-hint {
    display: flex;
    gap: 20px;
    align-items: center;
    color: #999;
    font-size: 14px;
    margin-top: 4px;
  }

  .key-badge {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 13px;
    color: #ddd;
  }
</style>
</head>
<body>

<div class="stars" id="stars-container"></div>

<div id="game-wrapper">
  <canvas id="game-canvas"></canvas>

  <div id="ui-overlay">
    <div id="score-display">점수: 0</div>
    <div id="lives-display">❤️❤️❤️</div>
    <div id="level-display">LV 1</div>

    <div id="start-screen">
      <div class="screen-emoji">💩</div>
      <div class="screen-title">똥 피하기!</div>
      <div class="screen-sub">
        하늘에서 쏟아지는 똥을 피하세요!<br>
        살아남을수록 점수가 오릅니다
      </div>
      <div class="controls-hint">
        <span class="key-badge">← →</span>
        <span>키보드 또는</span>
        <span class="key-badge">터치</span>
        <span>드래그</span>
      </div>
      <button class="play-btn" id="start-btn">게임 시작!</button>
    </div>

    <div id="gameover-screen">
      <div class="screen-emoji" style="font-size:64px">💀</div>
      <div class="screen-title" style="font-size:34px">게임 오버</div>
      <div class="score-result" id="final-score">점수: 0</div>
      <div class="highscore-display" id="highscore-text">최고 기록: 0</div>
      <button class="play-btn" id="restart-btn">다시 하기!</button>
    </div>
  </div>
</div>

<script>
// --- Stars background ---
const starsContainer = document.getElementById('stars-container');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random()*100}%; left:${Math.random()*100}%;
    animation-duration:${Math.random()*3+2}s;
    animation-delay:${Math.random()*3}s;
  `;
  starsContainer.appendChild(s);
}

// --- Game Setup ---
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 20, 420);
  const maxH = Math.min(window.innerHeight - 20, 720);
  const ratio = Math.min(maxW / 420, maxH / 720);
  canvas.width = Math.floor(420 * ratio);
  canvas.height = Math.floor(720 * ratio);
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); });

const W = () => canvas.width;
const H = () => canvas.height;
const SCALE = () => canvas.width / 420;

// --- Game State ---
let state = 'start'; // start | playing | gameover
let score = 0;
let highScore = parseInt(localStorage.getItem('poopDodgeHigh') || '0');
let lives = 3;
let level = 1;
let frameCount = 0;
let poops = [];
let particles = [];
let shakeFrames = 0;
let lastTime = 0;

// --- Player ---
const player = {
  x: 210,
  y: 640,
  w: 48,
  h: 48,
  speed: 6,
  invincible: 0,
  moving: 0, // -1 left, 0 still, 1 right
};

// --- Controls ---
const keys = {};
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

// Touch / Mouse drag
let touchStartX = null;
let playerStartX = null;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  playerStartX = player.x;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touchStartX === null) return;
  const dx = (e.touches[0].clientX - touchStartX) / SCALE();
  player.x = Math.max(player.w/2, Math.min(420 - player.w/2, playerStartX + dx));
}, { passive: false });

canvas.addEventListener('touchend', () => { touchStartX = null; });

canvas.addEventListener('mousemove', e => {
  if (state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  player.x = (e.clientX - rect.left) / SCALE();
  player.x = Math.max(player.w/2, Math.min(420 - player.w/2, player.x));
});

// --- Poop object factory ---
function spawnPoop() {
  const speedBase = 2.5 + level * 0.4 + Math.random() * 1.5;
  const size = 28 + Math.random() * 22;
  return {
    x: size/2 + Math.random() * (420 - size),
    y: -size,
    size,
    speed: speedBase,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.15,
    wobble: Math.random() * Math.PI * 2,
    type: Math.random() < 0.15 ? 'mega' : (Math.random() < 0.2 ? 'fast' : 'normal'),
  };
}

// --- Spawn particles ---
function spawnParticles(x, y, color, n=12) {
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i) / n + Math.random() * 0.5;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x: x * SCALE(), y: y * SCALE(),
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.035 + Math.random() * 0.03,
      size: 4 + Math.random() * 6,
      color,
    });
  }
}

// --- Draw emoji on canvas ---
function drawEmoji(emoji, x, y, size, rot=0) {
  ctx.save();
  ctx.translate(x * SCALE(), y * SCALE());
  ctx.rotate(rot);
  ctx.font = `${size * SCALE()}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, 0, 0);
  ctx.restore();
}

// --- Draw player ---
function drawPlayer() {
  const s = SCALE();
  const px = player.x * s;
  const py = player.y * s;
  const pw = player.w * s;
  const ph = player.h * s;

  ctx.save();
  if (player.invincible > 0 && Math.floor(player.invincible / 5) % 2 === 0) {
    ctx.globalAlpha = 0.3;
  }

  // Shadow
  ctx.save();
  ctx.globalAlpha *= 0.25;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(px, py + ph * 0.5 + 4, pw * 0.4, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Glow
  if (player.invincible > 0) {
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = 20 * s;
  }

  // Body
  ctx.font = `${44 * s}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Running animation
  const runOffset = Math.sin(frameCount * 0.3) * 2 * s;
  ctx.fillText('🧑', px, py + runOffset);

  ctx.restore();

  // Speed lines
  if (Math.abs(player.moving) > 0) {
    const s2 = SCALE();
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 3; i++) {
      const lx = px - player.moving * (30 + i*15) * s2;
      const ly = py + (-10 + i*10) * s2;
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx + player.moving * (20 + i*5) * s2, ly);
      ctx.globalAlpha = 0.4 - i * 0.12;
      ctx.stroke();
    }
    ctx.restore();
  }
}

// --- Draw poop ---
function drawPoop(p) {
  const s = SCALE();
  p.wobble += 0.07;
  const wobbleY = Math.sin(p.wobble) * 2;

  ctx.save();
  ctx.translate(p.x * s, (p.y + wobbleY) * s);
  ctx.rotate(p.rot);

  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(0, p.size * 0.4 * s, p.size * 0.35 * s, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  let emoji = '💩';
  let fontSize = p.size;
  if (p.type === 'mega') { emoji = '💩'; fontSize = p.size * 1.3; }
  if (p.type === 'fast') { emoji = '💩'; }

  if (p.type === 'fast') {
    ctx.shadowColor = '#ff4400';
    ctx.shadowBlur = 10 * s;
  }
  if (p.type === 'mega') {
    ctx.shadowColor = '#8b4513';
    ctx.shadowBlur = 15 * s;
  }

  ctx.font = `${fontSize * s}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, 0, 0);
  ctx.restore();

  // Warn indicator
  if (p.y < 40) {
    ctx.save();
    ctx.globalAlpha = 0.7 * (1 - p.y/40);
    ctx.font = `${12 * s}px serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff0';
    ctx.fillText('⚠️', p.x * s, 15 * s);
    ctx.restore();
  }
}

// --- Draw background ---
function drawBackground() {
  const s = SCALE();
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H());
  const t = (level - 1) / 10;
  const r = Math.floor(20 + t * 60);
  const g = Math.floor(10 + t * 5);
  const b = Math.floor(40 + t * 20);
  grad.addColorStop(0, `rgb(${r},${g},${b})`);
  grad.addColorStop(1, `rgb(${Math.floor(r*0.5)},${Math.floor(g*1.5+20)},${Math.floor(b*0.6+30)})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W(), H());

  // Ground
  const groundY = H() - 50 * s;
  ctx.fillStyle = '#2d5a1b';
  ctx.fillRect(0, groundY, W(), 50 * s);
  ctx.fillStyle = '#3d7a28';
  ctx.fillRect(0, groundY, W(), 12 * s);

  // Grass tufts
  for (let i = 0; i < 12; i++) {
    const gx = (i * 40 + 10) * s;
    ctx.font = `${18 * s}px serif`;
    ctx.textAlign = 'center';
    ctx.fillText('🌿', gx, groundY + 6 * s);
  }

  // Clouds
  const clouds = ['☁️', '⛅', '☁️'];
  clouds.forEach((c, i) => {
    const cx = ((frameCount * 0.3 + i * 160) % 480) * s;
    ctx.globalAlpha = 0.5;
    ctx.font = `${35 * s}px serif`;
    ctx.textAlign = 'center';
    ctx.fillText(c, cx, (40 + i * 20) * s);
    ctx.globalAlpha = 1;
  });
}

// --- Collision check ---
function checkCollision(p) {
  const dx = p.x - player.x;
  const dy = p.y - player.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const hitRadius = (p.size * 0.35 + player.w * 0.32);
  return dist < hitRadius;
}

// --- Update ---
function update(dt) {
  frameCount++;

  // Player movement (keyboard)
  let prevX = player.x;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
    player.x -= player.speed * SCALE() * (dt / 16);
    player.moving = -1;
  } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
    player.x += player.speed * SCALE() * (dt / 16);
    player.moving = 1;
  } else {
    player.moving = 0;
  }
  player.x = Math.max(player.w/2, Math.min(420 - player.w/2, player.x));
  if (player.x !== prevX) player.moving = player.x < prevX ? -1 : 1;

  if (player.invincible > 0) player.invincible--;

  // Score
  score += dt / 100;
  level = 1 + Math.floor(score / 100);

  // Spawn poops
  const spawnRate = Math.max(15, 55 - level * 4);
  if (frameCount % spawnRate === 0) {
    poops.push(spawnPoop());
    if (level > 3 && frameCount % (spawnRate * 3) === 0) poops.push(spawnPoop());
  }

  // Update poops
  poops = poops.filter(p => {
    let speedMult = p.type === 'fast' ? 1.8 : (p.type === 'mega' ? 0.75 : 1);
    p.y += p.speed * speedMult * SCALE() * (dt / 16);
    p.rot += p.rotSpeed;

    // Hit ground
    if (p.y > 660) {
      spawnParticles(p.x, 640, '#8B4513', 6);
      return false;
    }

    // Hit player
    if (player.invincible === 0 && checkCollision(p)) {
      lives--;
      player.invincible = 80;
      shakeFrames = 20;
      spawnParticles(player.x, player.y, '#ff4444', 16);
      spawnParticles(p.x, p.y, '#8B4513', 12);
      if (lives <= 0) {
        state = 'gameover';
        showGameOver();
      }
      return false;
    }
    return true;
  });

  // Update particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= p.decay;
    return p.life > 0;
  });

  if (shakeFrames > 0) shakeFrames--;
}

// --- Draw ---
function draw() {
  ctx.clearRect(0, 0, W(), H());

  ctx.save();
  if (shakeFrames > 0) {
    const intensity = shakeFrames * 0.5;
    ctx.translate(
      (Math.random() - 0.5) * intensity,
      (Math.random() - 0.5) * intensity
    );
  }

  drawBackground();

  poops.forEach(drawPoop);
  drawPlayer();

  // Particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  ctx.restore();

  // Update UI
  document.getElementById('score-display').textContent = `점수: ${Math.floor(score)}`;
  document.getElementById('lives-display').textContent = '❤️'.repeat(Math.max(0, lives));
  document.getElementById('level-display').textContent = `LV ${level}`;
}

// --- Game Over ---
function showGameOver() {
  if (score > highScore) {
    highScore = Math.floor(score);
    localStorage.setItem('poopDodgeHigh', highScore);
  }
  document.getElementById('final-score').textContent = `점수: ${Math.floor(score)}`;
  document.getElementById('highscore-text').textContent = `🏆 최고 기록: ${highScore}`;
  document.getElementById('gameover-screen').style.display = 'flex';
}

// --- Reset ---
function resetGame() {
  score = 0;
  lives = 3;
  level = 1;
  frameCount = 0;
  poops = [];
  particles = [];
  shakeFrames = 0;
  player.x = 210;
  player.y = 640;
  player.invincible = 0;
  player.moving = 0;
}

// --- Game Loop ---
function gameLoop(timestamp) {
  const dt = Math.min(timestamp - lastTime, 50);
  lastTime = timestamp;

  if (state === 'playing') {
    update(dt);
    draw();
  } else if (state === 'start' || state === 'gameover') {
    // Still animate background
    frameCount++;
    drawBackground();
  }

  requestAnimationFrame(gameLoop);
}

// --- Buttons ---
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-screen').style.display = 'none';
  resetGame();
  state = 'playing';
});

document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('gameover-screen').style.display = 'none';
  resetGame();
  state = 'playing';
});

// --- Start ---
requestAnimationFrame(ts => {
  lastTime = ts;
  requestAnimationFrame(gameLoop);
});
</script>
</body>
</html>
